version: 2
updates:
  # Disable npm updates to fix network connectivity issues
  # These were causing repeated failures due to proxy connection errors
  # Re-enable when infrastructure is stable
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0  # Disables PRs for this update type

  - package-ecosystem: "npm"
    directory: "/packages/create-bnb-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0  # Disables PRs for this update type

  - package-ecosystem: "npm"
    directory: "/typescript/4everland-hosting-mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0  # Disables PRs for this update type

  - package-ecosystem: "npm"
    directory: "/typescript/bnbchain-mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0  # Disables PRs for this update type

  - package-ecosystem: "npm"
    directory: "/typescript/eliza-chatbot"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0  # Disables PRs for this update type
